<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TV</title>
    <meta name="referrer" content="no-referrer">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }
        #player-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        iframe, video {
            width: 100%;
            height: 100%;
            border: none;
            object-fit: cover;
            /* منع اللاعب من التفاعل مع الشاشة بالماوس */
            pointer-events: none; 
        }
    </style>
</head>
<body>
    <div id="player-container"></div>
    <script>
        // سحب البيانات اللي يرسلها السكربت (client.lua)
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
        const videoId = params.get('v');
        const startTime = parseInt(params.get('t')) || 0;
        const container = document.getElementById('player-container');

        let currentVolume = 1.0;

        // 1. تشغيل اليوتيوب
        if (type === 'youtube' && videoId) {
            // استخدمنا start عشان يزامن الوقت، و origin لتخطي حظر يوتيوب
            container.innerHTML = `<iframe id="yt" src="https://www.youtube.com/embed/${videoId}?autoplay=1&controls=0&rel=0&disablekb=1&enablejsapi=1&start=${startTime}&origin=https://www.youtube.com" allow="autoplay; encrypted-media"></iframe>`;
        } 
        // 2. تشغيل تويتش
        else if (type === 'twitch' && videoId) {
            container.innerHTML = `<iframe id="tw" src="https://player.twitch.tv/?channel=${videoId}&parent=twitch.tv&parent=localhost&autoplay=true" allow="autoplay; fullscreen"></iframe>`;
        } 
        // 3. تشغيل كيك
        else if (type === 'kick' && videoId) {
            container.innerHTML = `<iframe id="kk" src="https://player.kick.com/${videoId}?autoplay=true" allow="autoplay; fullscreen"></iframe>`;
        } 
        // 4. تشغيل روابط الفيديو المباشرة (mp4, webm)
        else if (type === 'direct' && videoId) {
            container.innerHTML = `<video id="direct-video" src="${decodeURIComponent(videoId)}" autoplay loop></video>`;
            const directVideo = document.getElementById('direct-video');
            directVideo.currentTime = startTime; // مزامنة الوقت
        }

        // استقبال أوامر الصوت والإيقاف من السكربت (لتفعيل الصوت المحيطي 3D)
        window.addEventListener('message', function(event) {
            let data = event.data;
            if (typeof data === 'string') {
                try { data = JSON.parse(data); } catch (e) {}
            }
            if (!data || !data.type) return;

            // التحكم بمستوى الصوت
            if (data.type === 'volume') {
                currentVolume = Math.max(0, Math.min(1, data.volume));
                
                if (type === 'youtube') {
                    const yt = document.getElementById('yt');
                    if (yt && yt.contentWindow) {
                        yt.contentWindow.postMessage(JSON.stringify({ event: 'command', func: 'setVolume', args: [currentVolume * 100] }), '*');
                    }
                } 
                else if (type === 'twitch') {
                    const tw = document.getElementById('tw');
                    if (tw && tw.contentWindow) {
                        tw.contentWindow.postMessage(JSON.stringify({ event: 'setVolume', data: [currentVolume] }), '*');
                    }
                } 
                else if (type === 'direct') {
                    const dv = document.getElementById('direct-video');
                    if (dv) dv.volume = currentVolume;
                }
            }

            // إيقاف الشاشة
            if (data.type === 'stop') {
                container.innerHTML = '';
            }
        });
    </script>
</body>
</html>
