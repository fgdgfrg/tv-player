<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
iframe { width: 100%; height: 100%; border: none; display: block; }
</style>
</head>
<body>
<iframe id="player" allowfullscreen allow="autoplay; fullscreen; encrypted-media"></iframe>
<script>
const p = new URLSearchParams(window.location.search);
const type = p.get('type');
const v = p.get('v');
const f = document.getElementById('player');

if (type === 'youtube' && v) {
    f.src = 'https://www.youtube-nocookie.com/embed/' + v + '?autoplay=1&controls=1';
} else if (type === 'kick' && v) {
    f.src = 'https://player.kick.com/' + v + '?autoplay=1';
} else if (type === 'twitch' && v) {
    f.src = 'https://player.twitch.tv/?channel=' + v + '&parent=fgdgfrg.github.io&autoplay=true';
}
</script>
</body>
</html>
